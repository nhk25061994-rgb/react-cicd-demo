apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: react-demo-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: react-demo
  source:
    repoURL: git@github.com:nhk25061994-rgb/react-cicd-demo.git
    targetRevision: main
    path: helm/react-app
    helm:
      valueFiles:
        - values.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  project: default
